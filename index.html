// ═══ WORD EXPORT ═════════════════════════════════════════════════════════════
const COL_LABELS = {
  fecha_aviso:'Fecha',hora_aviso:'Hora',servicio:'Servicio',averia:'Avería',
  acciones:'Acciones',tecnico_nombre:'Técnico',solucionado:'Resuelto',
  fecha_fin:'Fecha Fin',hora_fin:'Hora Fin',created_at:'Registro'
}
const COL_PCT = {
  fecha_aviso:7,hora_aviso:5,servicio:11,averia:22,acciones:26,
  tecnico_nombre:11,solucionado:6,fecha_fin:7,hora_fin:5,created_at:10

function fmtVal(key, val) {
  if(val===null||val===undefined||val==='') return '—'
  if(key==='solucionado') return val?'✓ Sí':'✗ No'
  if(key==='created_at') return new Date(val).toLocaleString('es-ES',{dateStyle:'short',timeStyle:'short'})
  if(key==='hora_aviso'||key==='hora_fin') return String(val).substring(0,5)
  if(key==='fecha_aviso'||key==='fecha_fin') return new Date(val+'T00:00:00').toLocaleDateString('es-ES')
  return String(val)
}

async function exportWord(avisos, selectedCols, label) {
  try {
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign, PageOrientation } = docx

    const cols = selectedCols.filter(c => COL_LABELS[c])
    const totalPct = cols.reduce((s,c)=>s+(COL_PCT[c]||8),0)
    const pcts = cols.map(c=>Math.floor(((COL_PCT[c]||8)/totalPct)*100))
    pcts[pcts.length-1] += 100-pcts.reduce((a,b)=>a+b,0)

    const brd = {style:BorderStyle.SINGLE,size:1,color:'C8D8E8'}
    const brds = {top:brd,bottom:brd,left:brd,right:brd}

    const hRow = new TableRow({tableHeader:true,children:cols.map((col,i)=>new TableCell({
      borders:brds,width:{size:pcts[i],type:WidthType.PERCENTAGE},
      shading:{fill:'1B3A5C',type:ShadingType.CLEAR},
      margins:{top:80,bottom:80,left:100,right:100},verticalAlign:VerticalAlign.CENTER,
      children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:COL_LABELS[col],bold:true,color:'FFFFFF',font:'Calibri',size:17})]})]
    }))})

    const dRows = avisos.map((av,ri)=>new TableRow({children:cols.map((col,i)=>new TableCell({
      borders:brds,width:{size:pcts[i],type:WidthType.PERCENTAGE},
      shading:{fill:ri%2===0?'FFFFFF':'EEF4FB',type:ShadingType.CLEAR},
      margins:{top:60,bottom:60,left:100,right:100},verticalAlign:VerticalAlign.CENTER,
      children:[new Paragraph({children:[new TextRun({
        text:fmtVal(col,av[col]),font:'Calibri',size:16,
        color:col==='solucionado'?(av[col]?'1a7a3c':'cc2222'):'1a2a3a',bold:col==='solucionado'
      })]})]
    }))}))

    const table = new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[hRow,...dRows]})
    const resolved = avisos.filter(a=>a.solucionado).length

    const doc = new Document({
      styles:{default:{document:{run:{font:'Calibri',size:20}}}},
      sections:[{
        properties:{page:{size:{width:12240,height:15840,orientation:PageOrientation.LANDSCAPE},margin:{top:720,right:720,bottom:720,left:720}}},
        children:[
          new Paragraph({spacing:{after:80},children:[new TextRun({text:'INFORME DE GUARDIAS — ELECTROMEDICINA',bold:true,size:28,font:'Calibri',color:'1B3A5C'})]}),
          new Paragraph({spacing:{after:20},children:[
            new TextRun({text:'Período: ',size:19,font:'Calibri',color:'333333',bold:true}),
            new TextRun({text:label,size:19,font:'Calibri',color:'1B3A5C',bold:true}),
            new TextRun({text:`   |   Avisos: ${avisos.length}   |   Resueltos: ${resolved}   |   Pendientes: ${avisos.length-resolved}`,size:17,font:'Calibri',color:'666666'}),
          ]}),
          new Paragraph({spacing:{after:20},children:[new TextRun({text:`Generado: ${new Date().toLocaleString('es-ES')}   |   Polygon Servicio Técnico · Electromedicina`,size:15,font:'Calibri',color:'999999'})]}),
          new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:12,color:'1B3A5C',space:1}},spacing:{after:280},children:[]}),
          table,
        ]
      }]
    })
    const blob = await Packer.toBlob(doc)
    saveAs(blob, `guardias_${label.replace(/[\/\s·—]/g,'_')}.docx`)
  } catch(e) {
    alert('Error generando Word: ' + e.message)
    console.error(e)
  }
}

// ═══ SHIFT UTILS ═════════════════════════════════════════════════════════════
function getCurrentShift() {
  const now = new Date(), dow = now.getDay(), h = now.getHours()
  const pad = n=>String(n).padStart(2,'0')
  const fmt = d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`
  const add = (n)=>{const r=new Date(now);r.setDate(r.getDate()+n);return fmt(r)}
  const today=fmt(now), yest=add(-1), tom=add(1)
  if(dow===6) return h>=7?{label:'Guardia Sábado',from:today,to:tom}:{label:'Guardia Viernes Noche',from:yest,to:today}
  if(dow===0) return h>=7?{label:'Guardia Domingo',from:today,to:tom}:{label:'Guardia Sábado',from:yest,to:today}
  if(h>=20) return {label:'Guardia Noche',from:today,to:tom}
  if(h<7)   return {label:'Guardia Noche',from:yest,to:today}
  return {label:'Próxima guardia',from:today,to:tom}
}
function fmtShift(s) {
  const f=d=>new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'2-digit'})
  return `${f(s.from)} → ${f(s.to)}`
}

// ═══ HELPERS UI ══════════════════════════════════════════════════════════════
const h = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag)
  for(const [k,v] of Object.entries(attrs)) {
    if(k==='style'&&typeof v==='object') Object.assign(el.style, v)
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v)
    else if(k==='className') el.className = v
    else el.setAttribute(k, v)
  }
  for(const c of children.flat()) {
    if(c==null||c===false) continue
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c)
  }
  return el
}

// ═══ TÉCNICOS ════════════════════════════════════════════════════════════════
async function loadTecnicos() {
  const {data} = await db.from('tecnicos').select('*').order('nombre')
  setState({tecnicos: data||[]})
}

async function addTecnico() {
  const {nombre,email,password} = state.tecForm
  if(!nombre||!email||!password) return
  const bytes = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password))
  const hash = Array.from(new Uint8Array(bytes)).map(x=>x.toString(16).padStart(2,'0')).join('')
  const {error} = await db.from('tecnicos').insert({nombre, email:email.toLowerCase(), password_hash:hash})
  setState({tecMsg: error?'Error: '+error.message:'✓ Técnico creado', tecForm:{nombre:'',email:'',password:''}})
  loadTecnicos()
  setTimeout(()=>setState({tecMsg:''}), 3000)
}

async function toggleTecnico(id, activo) {
  await db.from('tecnicos').update({activo:!activo}).eq('id',id)
  loadTecnicos()
}

function renderTecnicos() {
  const formRow = div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:'12px',alignItems:'end'}},

        )
      ))
    )
  )

  return div({className:'up'},
    secTitle('Gestión de Técnicos'),
    glassCard(div({}, formRow, msgEl||''), {marginBottom:'16px'}),
    tableEl
  )
}

// ═══ EXTRAER ═════════════════════════════════════════════════════════════════
function getRange() {
  const shift = getCurrentShift()
  if(state.mode==='actual') return {from:shift.from,to:shift.to,label:shift.label}
  if(state.mode==='turno') {
    const d=new Date(state.date+'T12:00:00'),pad=n=>String(n).padStart(2,'0')
    const nx=new Date(d);nx.setDate(nx.getDate()+1)
    const fmt=dt=>`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`
    const lb={lv:'Guardia L-V',sab:'Guardia Sábado',dom:'Guardia Domingo'}
    return{from:state.date,to:fmt(nx),label:`${lb[state.turno]} ${new Date(state.date+'T12:00:00').toLocaleDateString('es-ES')}`}
  }
  return{from:state.dateFrom,to:state.dateTo,label:`${new Date(state.dateFrom+'T12:00:00').toLocaleDateString('es-ES')} — ${new Date(state.dateTo+'T12:00:00').toLocaleDateString('es-ES')}`}
}

async function doSearch() {
  setState({loading:true,searched:true})
  const r = getRange()
  const {data,error} = await db.from('avisos').select('*').gte('fecha_aviso',r.from).lte('fecha_aviso',r.to).order('fecha_aviso').order('hora_aviso')
  if(error) console.error('Supabase error:', error)
  setState({avisos:data||[],loading:false})
}

function fmtCell(key,val) {
  if(val===null||val===undefined||val==='') return span({style:{color:'var(--t3)'}},'—')
  if(key==='solucionado') return badge(val?'✓ Sí':'✗ No', val?'green':'red')
  if(key==='hora_aviso'||key==='hora_fin') return span({style:{fontFamily:'var(--mono)',fontSize:'12px'}},String(val).substring(0,5))
  if(key==='fecha_aviso'||key==='fecha_fin') return span({style:{fontFamily:'var(--mono)',fontSize:'12px'}},new Date(val+'T12:00:00').toLocaleDateString('es-ES'))
  if(key==='created_at') return span({style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--t3)'}},new Date(val).toLocaleString('es-ES',{dateStyle:'short',timeStyle:'short'}))
  return span({style:{fontSize:key==='averia'||key==='acciones'?'12px':'13px',lineHeight:'1.45'}},String(val))
}

      style:{flex:'1',padding:'14px 16px',textAlign:'left',borderRadius:'12px',
        background:state.mode===v?'rgba(79,172,254,0.1)':'rgba(255,255,255,0.03)',
        border:`1px solid ${state.mode===v?'rgba(79,172,254,0.35)':'var(--b1)'}`,
        color:state.mode===v?'var(--t1)':'var(--t2)',
        boxShadow:state.mode===v?'0 0 24px rgba(79,172,254,0.1)':'none',
      }},
      div({style:{fontSize:'18px',marginBottom:'6px'}},ic),
      div({style:{fontSize:'13px',fontWeight:'700',marginBottom:'3px'}},lb),
      div({style:{fontSize:'11px',color:state.mode===v?'var(--a)':'var(--t3)'}},sub)
    ))
  )

  let controls
  if(state.mode==='actual') {
    controls = div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'12px 16px',background:'rgba(79,172,254,0.06)',border:'1px solid rgba(79,172,254,0.15)',borderRadius:'10px'}},
      span({style:{width:'8px',height:'8px',borderRadius:'50%',background:'var(--a)',animation:'pulse 2s infinite',flexShrink:'0'}}),
      span({style:{fontWeight:'600',color:'var(--a)',fontSize:'13px'}},shift.label),
      span({style:{color:'var(--t3)',fontSize:'12px'}},fmtShift(shift))
    )
  } else if(state.mode==='turno') {
    const turnoSel = sel({style:{width:'100%'},onchange:e=>setState({turno:e.target.value})},
      opt('lv','L-V Noche (20:00 → 07:00)',state.turno==='lv'),
      opt('sab','Sábado (07:00 → 07:00 dom)',state.turno==='sab'),
      opt('dom','Domingo (07:00 → 07:00 lun)',state.turno==='dom')
    )
    controls = div({style:{display:'flex',gap:'14px',alignItems:'flex-end'}},
      div({style:{flex:'1'}},lbl('Tipo de turno'),turnoSel),
      div({style:{flex:'1'}},lbl('Fecha inicio'),inp({type:'date',value:state.date,onchange:e=>setState({date:e.target.value})}))
    )
  } else {
    controls = div({style:{display:'flex',gap:'14px',alignItems:'flex-end'}},
      div({style:{flex:'1'}},lbl('Desde'),inp({type:'date',value:state.dateFrom,onchange:e=>setState({dateFrom:e.target.value})})),
      div({style:{flex:'1'}},lbl('Hasta'),inp({type:'date',value:state.dateTo,onchange:e=>setState({dateTo:e.target.value})}))
    )
  }

  const pillsContainer = div({style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'20px'}},
    ...ALL_COLS.map(c=>{
      const on = state.cols.includes(c.key)
      return btn({
        onclick:()=>setState({cols: on?state.cols.filter(k=>k!==c.key):[...state.cols,c.key]}),
        style:{padding:'5px 13px',fontSize:'12px',fontWeight:'600',borderRadius:'20px',
          background:on?'rgba(79,172,254,0.1)':'rgba(255,255,255,0.03)',
          color:on?'var(--a)':'var(--t3)',
          border:`1px solid ${on?'rgba(79,172,254,0.3)':'var(--b1)'}`}
      }, (on?'✓ ':'')+c.label)
    })
  )

  const actions = div({style:{display:'flex',gap:'10px',marginTop:'4px'}},
    pBtn(state.loading?'⟳ Buscando…':'🔍 Buscar registros', doSearch, state.loading),
    state.avisos.length>0 ? gBtn(state.exporting?'Generando…':'📄 Exportar Word', async()=>{
      setState({exporting:true})
      await exportWord(state.avisos, state.cols, getRange().label)
      setState({exporting:false})
    }, state.exporting||!state.cols.length) : null
  )

  const formCard = glassCard(div({},
    modeCards, controls,
    div({style:{height:'1px',background:'var(--b1)',margin:'20px 0'}}),
    lbl('Columnas en el Word'), pillsContainer,
    actions
  ), {marginBottom:'20px'})

  let results = ''
  if(state.loading) {
    results = spinner()
  } else if(state.searched) {
    const av = state.avisos
    const statsRow = av.length>0 ? div({style:{display:'flex',gap:'8px',marginBottom:'14px',flexWrap:'wrap'}},
      badge(`${av.length} AVISOS`,'blue'),
      badge(`✓ ${av.filter(a=>a.solucionado).length} RESUELTOS`,'green'),
      badge(`⏳ ${av.filter(a=>!a.solucionado).length} PENDIENTES`,'yellow')
    ) : null

    const tableEl = av.length===0
      ? glassCard(div({style:{textAlign:'center',padding:'32px',color:'var(--t3)'}},'No hay avisos para este período.'))
      : div({className:'glass',style:{padding:'0',overflow:'hidden'}},
          div({style:{overflowX:'auto'}},
            h('table',{},
              h('thead',{},h('tr',{},...ALL_COLS.filter(c=>state.cols.includes(c.key)).map(c=>h('th',{},c.label)))),
              h('tbody',{},...av.map(av=>
                h('tr',{},...ALL_COLS.filter(c=>state.cols.includes(c.key)).map(c=>{
                  const td = h('td',{})
                  td.style.maxWidth = c.key==='averia'||c.key==='acciones'?'280px':'auto'
                  td.appendChild(fmtCell(c.key,av[c.key]))
                  return td
                }))
              ))
            )
          )
        )

    results = div({className:'up'}, statsRow||'', tableEl)
  }

  return div({className:'up'}, secTitle('Extracción de Registros'), formCard, results||'')
}

// ═══ MAIN LAYOUT ═════════════════════════════════════════════════════════════
function renderMain() {
  const header = h('header',{style:{position:'sticky',top:'0',zIndex:'100',height:'56px',borderBottom:'1px solid var(--b1)',background:'rgba(3,8,15,0.9)',backdropFilter:'blur(24px)',display:'flex',alignItems:'center',padding:'0 32px',gap:'16px'}},
    div({style:{display:'flex',alignItems:'center',gap:'10px'}},
      span({style:{fontSize:'18px'}},'🏥'),
      span({style:{fontFamily:'var(--head)',fontSize:'16px',fontWeight:'800',background:'linear-gradient(135deg,#fff 20%,var(--a))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'.06em'}},'GUARDIAS EM'),
      span({style:{width:'1px',height:'14px',background:'var(--b2)'}}),
      span({style:{color:'var(--t3)',fontSize:'12px'}},'Polygon Servicio Técnico')
    ),
    div({style:{marginLeft:'auto',display:'flex',gap:'4px',alignItems:'center'}},
      ...[['extraer','📊 Datos'],['tecnicos','👥 Técnicos']].map(([id,lb])=>
        btn({onclick:()=>setState({tab:id}),style:{padding:'5px 14px',fontSize:'13px',borderRadius:'8px',fontWeight:state.tab===id?'600':'400',background:state.tab===id?'rgba(79,172,254,0.12)':'transparent',color:state.tab===id?'var(--a)':'var(--t3)',border:state.tab===id?'1px solid rgba(79,172,254,0.25)':'1px solid transparent'}},lb)
      ),
      btn({onclick:()=>{sessionStorage.removeItem('ga');setState({page:'login'})},style:{padding:'5px 12px',fontSize:'12px',background:'transparent',color:'var(--t3)',border:'1px solid var(--b1)',borderRadius:'8px',marginLeft:'8px'}},'↩ Salir')
    )
  )

  const content = div({style:{maxWidth:'1440px',margin:'0 auto',padding:'32px'}},
    state.tab==='tecnicos' ? renderTecnicos() : renderExtraer()
  )

  return div({style:{minHeight:'100vh'}},
    div({style:{position:'fixed',top:'0',left:'0',right:'0',height:'1px',background:'linear-gradient(90deg,transparent,rgba(79,172,254,0.4),transparent)',pointerEvents:'none',zIndex:'200'}}),
    header, content
  )
}

// ═══ RENDER ══════════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app')
  app.innerHTML = ''
  if(state.page==='login') {
    app.appendChild(renderLogin())
  } else {
    app.appendChild(renderMain())
    if(state.tecnicos.length===0) loadTecnicos()
  }
}

render()
</script>
</body>
</html>
