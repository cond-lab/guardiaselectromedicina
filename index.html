// SHIFT UTILS
function getCurrentShift() {
  var now = new Date(), dow = now.getDay(), h = now.getHours()
  var pad = function(n){return String(n).padStart(2,'0')}
  var fmt = function(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
  var add = function(n){var r=new Date(now);r.setDate(r.getDate()+n);return fmt(r)}
  var today=fmt(now), yest=add(-1), tom=add(1)
  if(dow===6) return h>=7?{label:'Guardia Sabado',from:today,to:tom}:{label:'Guardia Viernes Noche',from:yest,to:today}
  if(dow===0) return h>=7?{label:'Guardia Domingo',from:today,to:tom}:{label:'Guardia Sabado',from:yest,to:today}
  if(h>=20) return {label:'Guardia Noche',from:today,to:tom}
  if(h<7)   return {label:'Guardia Noche',from:yest,to:today}
  return {label:'Proxima guardia',from:today,to:tom}
}
function fmtShift(s) {
  var f=function(d){return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'2-digit'})}
  return f(s.from)+' - '+f(s.to)
}

// DOM HELPERS
function h(tag, attrs) {
  var el = document.createElement(tag)
  attrs = attrs||{}
  for(var k in attrs) {
    var v = attrs[k]
    if(k==='style'&&typeof v==='object') Object.assign(el.style,v)
    else if(k==='className') el.className=v
    else if(k==='onclick') el.onclick=v
    else if(k==='onchange') el.onchange=v
    else if(k==='oninput') el.oninput=v
    else if(k==='onkeydown') el.onkeydown=v
    else if(k==='disabled') el.disabled=v
    else if(k==='type') el.type=v
    else if(k==='value') el.value=v
    else if(k==='placeholder') el.placeholder=v
    else el.setAttribute(k,v)
  }
  for(var i=2;i<arguments.length;i++) {
    var c=arguments[i]
    if(c==null||c===false) continue
    if(Array.isArray(c)) { for(var j=0;j<c.length;j++) { if(c[j]) el.appendChild(typeof c[j]==='string'?document.createTextNode(c[j]):c[j]) } }
    else el.appendChild(typeof c==='string'?document.createTextNode(c):c)
  }
  return el
}

function loadTecnicos() {

function addTecnico() {
  var f=state.tecForm
  if(!f.nombre||!f.email||!f.password)return
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(f.password)).then(function(bytes){
    var hash=Array.from(new Uint8Array(bytes)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')
    window.db.from('tecnicos').insert({nombre:f.nombre,email:f.email.toLowerCase(),password_hash:hash}).then(function(r){
      setState({tecMsg:r.error?'Error: '+r.error.message:'Tecnico creado',tecForm:{nombre:'',email:'',password:''}})
      loadTecnicos()
      setTimeout(function(){setState({tecMsg:''})},3000)
    })
  })
}

        opt('dom','Domingo (07:00-07:00)',state.turno==='dom')

      div({style:{flex:'1'}},lbl('Fecha'),inp({type:'date',value:state.date,onchange:function(e){setState({date:e.target.value})}}))
    )
  } else {
    controls=div({style:{display:'flex',gap:'14px',alignItems:'flex-end'}},
      div({style:{flex:'1'}},lbl('Desde'),inp({type:'date',value:state.dateFrom,onchange:function(e){setState({dateFrom:e.target.value})}})),
      div({style:{flex:'1'}},lbl('Hasta'),inp({type:'date',value:state.dateTo,onchange:function(e){setState({dateTo:e.target.value})}})
    ))
  }
  var pills=div({style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'20px'}},
    ...ALL_COLS.map(function(c){
      var on=state.cols.indexOf(c.key)>=0
      return btn({onclick:function(){setState({cols:on?state.cols.filter(function(k){return k!==c.key}):[].concat(state.cols,[c.key])})},style:{padding:'5px 13px',fontSize:'12px',fontWeight:'600',borderRadius:'20px',background:on?'rgba(79,172,254,0.1)':'rgba(255,255,255,0.03)',color:on?'var(--a)':'var(--t3)',border:'1px solid '+(on?'rgba(79,172,254,0.3)':'var(--b1)')}},(on?'+ ':'')+c.label)
    })
  )
  var actions=div({style:{display:'flex',gap:'10px',marginTop:'4px'}},
    pBtn(state.loading?'Buscando...':'Buscar registros',doSearch,state.loading),
    state.avisos.length>0?gBtn(state.exporting?'Generando...':'Exportar Word',function(){
      setState({exporting:true})
      exportWord(state.avisos,state.cols,getRange().label).then(function(){setState({exporting:false})})
    },state.exporting||!state.cols.length):null
  )
  var formCard=glassCard(div({},modeCards,controls,div({style:{height:'1px',background:'var(--b1)',margin:'20px 0'}}),lbl('Columnas en el Word'),pills,actions),{marginBottom:'20px'})
  var results=''
  if(state.loading){results=spinner()}
  else if(state.searched){
    var av=state.avisos
    var stats=av.length>0?div({style:{display:'flex',gap:'8px',marginBottom:'14px'}},badge(av.length+' AVISOS','blue'),badge(av.filter(function(a){return a.solucionado}).length+' RESUELTOS','green'),badge(av.filter(function(a){return !a.solucionado}).length+' PENDIENTES','yellow')):null
    var tableEl=av.length===0?glassCard(div({style:{textAlign:'center',padding:'32px',color:'var(--t3)'}},'No hay avisos para este periodo.')):div({className:'glass',style:{padding:'0',overflow:'hidden'}},div({style:{overflowX:'auto'}},h('table',{},h('thead',{},h('tr',{},...ALL_COLS.filter(function(c){return state.cols.indexOf(c.key)>=0}).map(function(c){return h('th',{},c.label)}))),h('tbody',{},...av.map(function(item){return h('tr',{},...ALL_COLS.filter(function(c){return state.cols.indexOf(c.key)>=0}).map(function(c){var td=h('td',{});if(c.key==='averia'||c.key==='acciones')td.style.maxWidth='280px';td.appendChild(fmtCell(c.key,item[c.key]));return td}))})))))
    results=div({className:'up'},stats||'',tableEl)
  }
  return div({className:'up'},secTitle('Extraccion de Registros'),formCard,results||'')
}

// MAIN
function renderMain() {
  var header=h('header',{style:{position:'sticky',top:'0',zIndex:'100',height:'56px',borderBottom:'1px solid var(--b1)',background:'rgba(3,8,15,0.9)',backdropFilter:'blur(24px)',display:'flex',alignItems:'center',padding:'0 32px',gap:'16px'}},
    div({style:{display:'flex',alignItems:'center',gap:'10px'}},
      span({style:{fontSize:'18px'}},'🏥'),
      span({style:{fontFamily:'var(--head)',fontSize:'16px',fontWeight:'800',background:'linear-gradient(135deg,#fff 20%,var(--a))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'GUARDIAS EM'),
      span({style:{width:'1px',height:'14px',background:'var(--b2)'}}),
      span({style:{color:'var(--t3)',fontSize:'12px'}},'Polygon Servicio Tecnico')
    ),
    div({style:{marginLeft:'auto',display:'flex',gap:'4px',alignItems:'center'}},
      ...[['extraer','Datos'],['tecnicos','Tecnicos']].map(function(t){
        return btn({onclick:function(){setState({tab:t[0]})},style:{padding:'5px 14px',fontSize:'13px',borderRadius:'8px',fontWeight:state.tab===t[0]?'600':'400',background:state.tab===t[0]?'rgba(79,172,254,0.12)':'transparent',color:state.tab===t[0]?'var(--a)':'var(--t3)',border:state.tab===t[0]?'1px solid rgba(79,172,254,0.25)':'1px solid transparent'}},t[1])
      }),
      btn({onclick:function(){sessionStorage.removeItem('ga');setState({page:'login'})},style:{padding:'5px 12px',fontSize:'12px',background:'transparent',color:'var(--t3)',border:'1px solid var(--b1)',borderRadius:'8px',marginLeft:'8px'}},'Salir')
    )
  )
  var content=div({style:{maxWidth:'1440px',margin:'0 auto',padding:'32px'}},state.tab==='tecnicos'?renderTecnicos():renderExtraer())
  return div({style:{minHeight:'100vh'}},header,content)
}

function render() {
  var app=document.getElementById('app')
  if(!app)return
  app.innerHTML=''
  if(!window.db){app.appendChild(div({style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#3a5a7a',fontFamily:'monospace'}},'Conectando...'));return}
  if(state.page==='login'){app.appendChild(renderLogin())}
  else{app.appendChild(renderMain());if(state.tab==='tecnicos'&&state.tecnicos.length===0)loadTecnicos()}
}
</script>
</body>
</html>
